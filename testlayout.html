<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{
       
        text-align: center;      
    }
    .Wrapper{
        display: grid;   
        grid-template-columns: 240px 500px 240px;
        gap: 10px;
        height: 600px;       
    }
    .LongestBox{
        display: grid;
        
    }  
    .Header{
        display: grid;
        grid-template-rows: 1fr 1fr 1fr;
        gap:10px ;
    }
    .SmallBox, .Small
    {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }     
    .ThirdColumns{
        display: grid;    
        grid-template-rows: 32% 66%;
        gap: 10px;
    }
    .one, .four, .two, .six, .eigh{
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: aqua;
    }  
    .three, .five, .seven{
        background-color: rgb(250, 17, 17);
        display: flex;
        align-items: center;
        justify-content: center;
    }   
        
    </style>
</head>
<body>
    <div class="Wrapper">
       <div class="LongestBox">
            <div class="one">1</div>           
       </div>
       <div class="Header">
                <div class="two">2</div>              
                <div class="SmallBox">
                    <div class="four">4</div>
                    <div class="five">5</div>                    
                </div>
                <div class="Small">
                    <div class="seven">7</div>
                    <div class="eigh">8</div>
                </div>               
        </div>
        <div class="ThirdColumns">
            <div class="three">3
                
            </div>
            
            <div class="six">6</div>
        </div>   
    </div>
</body>
</html>
