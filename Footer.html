<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        } 
        a{
            text-decoration: none;
        }
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px; 
            background-color: rgb(215, 214, 212);
        }

        .Icon {
            display: flex;
            gap: 15px;
            align-items: center;
        }

    </style>
</head>
<body>
   <footer>
        <p>© 2022 Jobster. All Right Reserved.</p>

        <div class="Icon">
            <a href="https://facebook.com" target="_blank">
                <img src="facebook.png" alt="Facebook" width="32" height="32">
            </a>  

            <a href="https://telegram.com" target="_blank">
                <img src="telegram.png" alt="Telegram" width="32" height="32">
            </a>

            <a href="https://youtube.com" target="_blank">
                <img src="youtube.png" alt="Youtube" width="32" height="32">
            </a>
        </div>
   </footer>
    
</body>
</html>
